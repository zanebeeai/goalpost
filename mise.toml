min_version = "2026.7.0"

[tools]
node = "24.18.0"
pnpm = "9.15.4"

[tasks.setup]
description = "Install dependencies and configure the local development stack"
run = [
  "pnpm install --frozen-lockfile",
  "pnpm db:start",
  "pnpm env:local",
]

[tasks.dev]
description = "Start the Goalpost development server"
run = "pnpm dev"

[tasks.check]
description = "Run the application checks used by CI"
run = [
  "pnpm format:check",
  "pnpm lint",
  "pnpm typecheck",
  "pnpm test:coverage",
  "pnpm build",
]
