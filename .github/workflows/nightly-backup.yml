name: Nightly encrypted backup

on:
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: goalpost-nightly-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: production
    env:
      RCLONE_CONFIG_SUPABASE_TYPE: s3
      RCLONE_CONFIG_SUPABASE_PROVIDER: Other
      RCLONE_CONFIG_SUPABASE_ENDPOINT: ${{ secrets.SUPABASE_S3_ENDPOINT }}
      RCLONE_CONFIG_SUPABASE_ACCESS_KEY_ID: ${{ secrets.SUPABASE_S3_ACCESS_KEY_ID }}
      RCLONE_CONFIG_SUPABASE_SECRET_ACCESS_KEY: ${{ secrets.SUPABASE_S3_SECRET_ACCESS_KEY }}
      RCLONE_CONFIG_SUPABASE_REGION: us-east-1
      RCLONE_CONFIG_R2_TYPE: s3
      RCLONE_CONFIG_R2_PROVIDER: Cloudflare
      RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      RCLONE_CONFIG_R2_REGION: auto
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      BACKUP_AGE_PUBLIC_KEY: ${{ secrets.BACKUP_AGE_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Install backup tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client age rclone
      - name: Snapshot database and media
        shell: bash
        run: |
          set -euo pipefail
          stamp="$(date -u +%F)"
          mkdir -p backup
          pg_dump "$SUPABASE_DB_URL" --format=custom --no-owner --no-acl > backup/database.dump
          age -r "$BACKUP_AGE_PUBLIC_KEY" -o backup/database.dump.age backup/database.dump
          rm backup/database.dump
          sha256sum backup/database.dump.age > backup/SHA256SUMS
          rclone copy backup "R2:${R2_BUCKET}/${stamp}/database" --immutable --checksum
          rclone copy "SUPABASE:goalpost-media" "R2:${R2_BUCKET}/${stamp}/media" --immutable --checksum --transfers 8 --checkers 16
          rclone check "SUPABASE:goalpost-media" "R2:${R2_BUCKET}/${stamp}/media" --checksum --one-way
          rclone lsf "R2:${R2_BUCKET}/${stamp}" --recursive > backup/OBJECTS.txt
          rclone copy backup "R2:${R2_BUCKET}/${stamp}/manifest" --immutable --checksum
      - name: Verify encrypted dump exists
        run: rclone size "R2:${R2_BUCKET}/$(date -u +%F)/database"
